name: Test tap-pingdom

on:
  push:
    branches: [main]
    paths:
    - tap_pingdom/**
    - tests/**
    - pyproject.toml
    - uv.lock
    - .github/workflows/test.yaml
  pull_request:
    paths:
    - tap_pingdom/**
    - tests/**
    - pyproject.toml
    - uv.lock
    - .github/workflows/test.yaml
  workflow_dispatch:
  schedule:
  # Run weekly on Monday at 12:00 PM UTC
  - cron: "0 12 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_COLOR: "1"
  # renovate: datasource=pypi depName=tox
  TOX_VERSION: 4.52.1
  # renovate: datasource=pypi depName=tox-uv
  TOX_UV_VERSION: 1.35.1
  # renovate: datasource=pypi depName=uv
  UV_VERSION: 0.11.6

jobs:
  build-package:
    name: Build & verify package
    runs-on: ubuntu-latest
    outputs:
      supported-python-versions: ${{ steps.baipp.outputs.supported_python_classifiers_json_array }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: hynek/build-and-inspect-python-package@fe0a0fb1925ca263d076ca4f2c13e93a6e92a33e # v2.17.0
        id: baipp

  test:
    name: Test
    runs-on: ubuntu-24.04
    needs: build-package
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        python-version: ${{ fromJson(needs.build-package.outputs.supported-python-versions) }}

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        python-version: ${{ matrix.python-version }}
        version: "${{ env.UV_VERSION }}"

    - name: Run tests
      env:
        TAP_PINGDOM_TOKEN: ${{ secrets.TAP_PINGDOM_TOKEN }}
        TAP_PINGDOM_START_DATE: ${{ secrets.TAP_PINGDOM_START_DATE }}
        MATRIX_PYTHON_VERSION: ${{ matrix.python-version }}
      run: >
          uvx
          --with tox-uv==${TOX_UV_VERSION}
          --with tox==${TOX_VERSION}
          tox -e ${MATRIX_PYTHON_VERSION}

  static:
    name: Static Analysis
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        version: ${{ env.UV_VERSION }}
    - name: Install tools
      run: >
          uv tool install
          --managed-python
          --with tox-uv==${TOX_UV_VERSION}
          --with tox==${TOX_VERSION}
          tox
    - name: Static Analysis
      run: tox -m check

  pre-commit:
    name: pre-commit
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: j178/prek-action@cbc2f23eb5539cf20d82d1aabd0d0ecbcc56f4e3 # v2.0.2
